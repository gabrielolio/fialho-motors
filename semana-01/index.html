<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semana 01 — Fialho Motors</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0F0F;
      --gold: #C8A96E;
      --text: #F0EDE8;
      --text-muted: #7A7570;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    .label {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
    }
    p {
      color: var(--text-muted);
      font-size: 0.9rem;
      max-width: 320px;
    }
    .badge {
      display: inline-block;
      background: rgba(200,169,110,0.12);
      border: 1px solid rgba(200,169,110,0.3);
      color: var(--gold);
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <span class="label">Fialho Motors · GWM</span>
  <h1>Semana 01</h1>
  <span class="badge">Em breve</span>
  <p>Relatório semanal em preparação. Atualizado automaticamente via JSON.</p>
</body>
</html>
